# Spec10x CI (v1.1 open-source onboarding, US-11-01-02)
#
# Every PR gets three verdicts:
#   - backend: the full pytest suite against a FRESH pgvector Postgres,
#     migrated with `alembic upgrade head` (D-11-06 — the slow long-lived-DB
#     failure class cannot exist here)
#   - frontend: lint + production build
#   - smoke: the fully-mocked Playwright suite (no backend needed)

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: spec10x
          POSTGRES_PASSWORD: spec10x_local
          POSTGRES_DB: spec10x_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spec10x"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_DEFAULT_BUCKETS: spec10x-uploads
        ports:
          - 9000:9000

    env:
      DATABASE_URL: postgresql+asyncpg://spec10x:spec10x_local@localhost:5432/spec10x_ci
      DATABASE_URL_SYNC: postgresql://spec10x:spec10x_local@localhost:5432/spec10x_ci
      REDIS_URL: redis://localhost:6379/0
      STORAGE_BACKEND: minio
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: spec10x-uploads
      MINIO_USE_SSL: "false"
      APP_ENV: development
      APP_SECRET_KEY: ci-secret
      BACKEND_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system libraries (weasyprint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libcairo2

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Enable pgvector on the fresh database
        run: |
          sudo apt-get install -y postgresql-client
          psql "postgresql://spec10x:spec10x_local@localhost:5432/spec10x_ci" \
            -c "CREATE EXTENSION IF NOT EXISTS vector"

      - name: Migrate (fresh database, full chain)
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_SYNC }}
        run: alembic upgrade head

      - name: Run backend suite
        working-directory: backend
        run: pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Production build
        working-directory: frontend
        run: npm run build

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run smoke suite (fully mocked)
        working-directory: frontend
        run: npm run test:smoke
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
