steps:
# Ship-blocking Playwright smoke suite (US-05-06-01 / D-05-04).
# Runs against a hermetic build (auth bypass + mocked API), Chromium only.
# If this step fails, the image is never built or pushed.
- name: 'mcr.microsoft.com/playwright:v1.61.1-noble'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      npm ci
      npm run test:smoke
  env:
    - 'CI=1'
- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build', 
    '-t', '${_IMAGE_TAG}', 
    '--build-arg', 'NEXT_PUBLIC_API_URL=${_API_URL}',
    '--build-arg', 'NEXT_PUBLIC_FIREBASE_API_KEY=${_FB_API_KEY}',
    '--build-arg', 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FB_AUTH_DOMAIN}',
    '--build-arg', 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FB_PROJECT_ID}',
    '--build-arg', 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FB_STORAGE_BUCKET}',
    '--build-arg', 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FB_MESSAGING_SENDER_ID}',
    '--build-arg', 'NEXT_PUBLIC_FIREBASE_APP_ID=${_FB_APP_ID}',
    '.']
substitutions:
  _IMAGE_TAG: 'us-central1-docker.pkg.dev/${PROJECT_ID}/spec10x-repo/frontend:v1'
  _API_URL: ''
  _FB_API_KEY: ''
  _FB_AUTH_DOMAIN: ''
  _FB_PROJECT_ID: ''
  _FB_STORAGE_BUCKET: ''
  _FB_MESSAGING_SENDER_ID: ''
  _FB_APP_ID: ''
options:
  logging: CLOUD_LOGGING_ONLY
images:
- '${_IMAGE_TAG}'
